name: Build Arab Chat APK

# Runs automatically every time you push to the repo, or you can
# trigger it manually from the "Actions" tab ("Run workflow" button).
on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK (for zipalign / apksigner)
        uses: android-actions/setup-android@v3

      - name: Install build-tools & platform-tools
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager "build-tools;35.0.0" "platform-tools"

      - name: Install apktool
        run: |
          curl -sL -o /usr/local/bin/apktool.jar \
            https://bitbucket.org/iBotPeaches/apktool/downloads/apktool_2.9.3.jar
          curl -sL -o /usr/local/bin/apktool \
            https://raw.githubusercontent.com/iBotPeaches/Apktool/master/scripts/linux/apktool
          chmod +x /usr/local/bin/apktool /usr/local/bin/apktool.jar

      - name: Rebuild APK with apktool
        run: |
          apktool b base_src -o out/arab_chat_unsigned.apk

      - name: Generate debug keystore
        run: |
          keytool -genkeypair -v \
            -keystore debug.keystore \
            -storepass android -keypass android \
            -alias androiddebugkey -keyalg RSA -keysize 2048 \
            -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

      - name: Zipalign
        run: |
          BUILD_TOOLS="$ANDROID_HOME/build-tools/35.0.0"
          "$BUILD_TOOLS/zipalign" -f -v 4 out/arab_chat_unsigned.apk out/arab_chat_aligned.apk

      - name: Sign APK
        run: |
          BUILD_TOOLS="$ANDROID_HOME/build-tools/35.0.0"
          "$BUILD_TOOLS/apksigner" sign \
            --ks debug.keystore --ks-pass pass:android --key-pass pass:android \
            --ks-key-alias androiddebugkey \
            --out out/arab_chat_debug_signed.apk \
            out/arab_chat_aligned.apk
          "$BUILD_TOOLS/apksigner" verify out/arab_chat_debug_signed.apk

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: arab-chat-debug-signed-apk
          path: out/arab_chat_debug_signed.apk
